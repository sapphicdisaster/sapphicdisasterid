<!doctype html>
<html class="dark" lang="en">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>PROJECT_DIR // id.lesbia.nz</title>
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=VT323&family=Inconsolata:wght@400;700&family=Press+Start+2P&display=swap"
            rel="stylesheet"
        />
        <script id="tailwind-config">
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            "on-surface": "#e5e2e1",
                            "inverse-primary": "#006a62",
                            surface: "#131313",
                            "text-bright": "#ffffff",
                            secondary: "#76d6d5",
                            "on-error": "#690005",
                            "on-primary-fixed-variant": "#005049",
                            "on-secondary-fixed": "#002020",
                            "inverse-surface": "#e5e2e1",
                            "text-dim": "#cccccc",
                            "on-secondary-container": "#ddfffe",
                            "secondary-container": "#007f7f",
                            "secondary-fixed": "#93f2f2",
                            "primary-fixed": "#61f9e9",
                            "on-secondary": "#003737",
                            "on-tertiary-fixed-variant": "#005227",
                            error: "#ffb4ab",
                            "outline-variant": "#3c4a47",
                            "tertiary-fixed-dim": "#4ae181",
                            "on-primary-container": "#006058",
                            tertiary: "#81ffa4",
                            "terminal-pink": "#ff4d80",
                            "surface-container-lowest": "#0e0e0e",
                            "light-teal": "#aaf0d1",
                            "error-container": "#93000a",
                            "tertiary-container": "#4ee483",
                            "secondary-fixed-dim": "#76d6d5",
                            "primary-container": "#40e0d0",
                            "surface-container": "#201f1f",
                            "on-primary-fixed": "#00201d",
                            "on-error-container": "#ffdad6",
                            background: "#131313",
                            "surface-container-highest": "#353534",
                            "on-tertiary-fixed": "#00210c",
                            "surface-bright": "#3a3939",
                            "on-background": "#e5e2e1",
                            "scanline-overlay": "rgba(0, 255, 200, 0.04)",
                            "on-surface-variant": "#bacac6",
                            primary: "#66fdec",
                            "on-primary": "#003732",
                            "primary-fixed-dim": "#3adccc",
                            "on-secondary-fixed-variant": "#004f4f",
                            "surface-dim": "#131313",
                            "on-tertiary-container": "#00622f",
                            "inverse-on-surface": "#313030",
                            "on-tertiary": "#003919",
                            "surface-container-low": "#1c1b1b",
                            "surface-container-high": "#2a2a2a",
                            "surface-variant": "#353534",
                            "tertiary-fixed": "#6bfe9a",
                            "surface-tint": "#3adccc",
                            outline: "#859491",
                        },
                        borderRadius: {
                            DEFAULT: "0.25rem",
                            lg: "0.5rem",
                            xl: "0.75rem",
                            full: "9999px",
                        },
                        spacing: {
                            "margin-desktop": "40px",
                            gutter: "16px",
                            unit: "4px",
                            "container-max": "1024px",
                            "margin-mobile": "20px",
                        },
                        fontFamily: {
                            "headline-xl-mobile": ["VT323"],
                            "headline-xl": ["VT323"],
                            "body-lg": ["Inconsolata"],
                            "body-md": ["Inconsolata"],
                            "headline-lg": ["VT323"],
                            "headline-lg-mobile": ["VT323"],
                            "label-ui": ["Press Start 2P"],
                        },
                        fontSize: {
                            "headline-xl-mobile": [
                                "2.5rem",
                                { lineHeight: "1.0", fontWeight: "400" },
                            ],
                            "headline-xl": [
                                "4rem",
                                { lineHeight: "1.0", fontWeight: "400" },
                            ],
                            "body-lg": [
                                "1.5rem",
                                { lineHeight: "1.4", fontWeight: "400" },
                            ],
                            "body-md": [
                                "1.2rem",
                                { lineHeight: "1.5", fontWeight: "400" },
                            ],
                            "headline-lg": [
                                "3rem",
                                { lineHeight: "1.1", fontWeight: "400" },
                            ],
                            "headline-lg-mobile": [
                                "2rem",
                                { lineHeight: "1.1", fontWeight: "400" },
                            ],
                            "label-ui": [
                                "0.8rem",
                                { lineHeight: "1.2", fontWeight: "400" },
                            ],
                        },
                    },
                },
            };
        </script>
        <style>
            body {
                background-color: #131313;
                color: #e5e2e1;
                margin: 0;
                padding: 0;
            }

            /* CRT scanline overlay */
            .crt-overlay {
                position: fixed;
                inset: 0;
                pointer-events: none;
                z-index: 10;
                background: linear-gradient(
                    to bottom,
                    rgba(255, 255, 255, 0),
                    rgba(255, 255, 255, 0) 50%,
                    rgba(0, 255, 200, 0.04) 50%,
                    rgba(0, 255, 200, 0.04)
                );
                background-size: 100% 4px;
                animation: scanlines 10s linear infinite;
            }

            @keyframes scanlines {
                0% {
                    background-position: 0 0;
                }
                100% {
                    background-position: 0 100vh;
                }
            }

            /* Subtle grid background */
            .grid-bg {
                position: fixed;
                inset: 0;
                pointer-events: none;
                z-index: 1;
                background-image:
                    linear-gradient(rgba(60, 74, 71, 0.4) 1px, transparent 1px),
                    linear-gradient(
                        90deg,
                        rgba(60, 74, 71, 0.4) 1px,
                        transparent 1px
                    );
                background-size: 20px 20px;
                opacity: 0.5;
            }

            /* Blinking block cursor */
            .cursor {
                display: inline-block;
                width: 10px;
                height: 1em;
                background-color: #66fdec;
                vertical-align: middle;
                animation: blink 1s step-end infinite;
            }

            @keyframes blink {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0;
                }
            }

            /* Terminal panel chrome */
            .term-panel {
                border: 1px solid #007f7f;
                background-color: rgba(19, 19, 19, 0.92);
            }

            .glowing-text {
                text-shadow: 0 0 8px #66fdec;
            }

            /* Scrollbar inside the projects panel */
            .term-scroll::-webkit-scrollbar {
                width: 6px;
            }
            .term-scroll::-webkit-scrollbar-track {
                background: #201f1f;
                border-left: 1px solid #007f7f;
            }
            .term-scroll::-webkit-scrollbar-thumb {
                background: #007f7f;
            }
            .term-scroll::-webkit-scrollbar-thumb:hover {
                background: #66fdec;
            }

            /* Nav button variants */
            .btn-terminal-primary {
                border: 1px solid #ff4d80;
                color: #ff4d80;
            }
            .btn-terminal-primary:hover {
                background: #ff4d80;
                color: #111;
                box-shadow: 0 0 10px #ff4d80;
            }

            /* Project card hover glow on title */
            .group:hover .card-title {
                text-shadow: 0 0 8px #66fdec;
                color: #66fdec;
            }
        </style>
    </head>

    <body class="relative antialiased min-h-screen flex flex-col">
        <!-- Environmental overlays -->
        <div class="grid-bg"></div>
        <div class="crt-overlay"></div>

        <!-- Terminal window — fills viewport minus nav bar -->
        <main
            class="flex-grow flex flex-col items-center justify-center relative z-20 p-4 md:p-margin-desktop pb-24 md:pb-28"
        >
            <div
                class="term-panel w-full max-w-4xl flex flex-col relative shadow-[0_0_20px_rgba(102,253,236,0.1)] h-[calc(100vh-7rem)] md:h-[calc(100vh-8rem)]"
            >
                <!-- Terminal title bar -->
                <div
                    class="h-8 border-b border-secondary-container bg-surface-container-high flex items-center px-3 justify-between shrink-0"
                >
                    <span
                        class="font-label-ui text-[10px] text-secondary tracking-widest"
                        id="term-header-text"
                        >BOOT_SEQ_V1.0</span
                    >
                    <div class="flex gap-2">
                        <div class="w-3 h-3 border border-secondary"></div>
                        <div class="w-3 h-3 border border-secondary"></div>
                        <div
                            class="w-3 h-3 border border-terminal-pink bg-terminal-pink/20"
                        ></div>
                    </div>
                </div>

                <!-- Boot sequence output (visible first) -->
                <div
                    class="flex-grow p-4 font-body-md text-primary overflow-hidden flex flex-col justify-end leading-tight whitespace-pre-wrap transition-opacity duration-500"
                    id="terminal-output"
                >
                    <!-- injected by JS -->
                </div>

                <!-- Projects directory (hidden until boot completes) -->
                <div
                    class="hidden flex-grow flex-col gap-4 p-4 md:p-6 font-body-md text-primary overflow-y-auto term-scroll transition-opacity duration-1000 opacity-0"
                    id="projects-container"
                >
                    <!-- Header row -->
                    <div
                        class="mb-2 flex flex-col sm:flex-row sm:items-end sm:justify-between gap-1"
                    >
                        <h2
                            class="font-headline-lg text-primary glowing-text border-b border-primary-fixed-dim inline-block pr-8"
                        >
                            /ACTIVE_PROJECTS
                        </h2>
                        <p
                            class="text-text-dim text-sm font-body-md"
                            id="module-count"
                        ></p>
                    </div>

                    <!-- Cards injected here by JS -->
                    <div
                        class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"
                        id="cards-grid"
                    ></div>
                </div>
            </div>
        </main>

        <!-- Bottom nav (all screen sizes) -->
        <nav
            class="flex justify-around items-center h-20 px-margin-mobile fixed bottom-0 w-full z-50 border-t border-outline-variant shadow-[0_-4px_20px_rgba(0,0,0,0.5)] bg-surface-container-lowest/90 backdrop-blur-lg"
        >
            <!-- CORE -->
            <a
                class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:opacity-100 hover:text-secondary active:scale-95 transition-transform cursor-pointer"
                href="https://id.lesbia.nz"
            >
                <span class="material-symbols-outlined">memory</span>
                <span class="font-label-ui text-[10px] mt-1">CORE</span>
            </a>
            <!-- PROJECTS (active) -->
            <a
                class="flex flex-col items-center justify-center text-primary bg-primary-container/10 rounded-xl py-1 px-3 shadow-[0_0_10px_#66fdec] active:scale-95 transition-transform cursor-pointer"
                href="https://id.lesbia.nz/projects"
            >
                <span
                    class="material-symbols-outlined"
                    style="font-variation-settings: &quot;FILL&quot; 1"
                    >save</span
                >
                <span class="font-label-ui text-[10px] mt-1">PROJECTS</span>
            </a>
            <!-- ASCEND -->
            <a
                class="btn-terminal-primary flex flex-col items-center justify-center opacity-80 hover:opacity-100 active:scale-95 transition-transform cursor-pointer py-1 px-3"
                href="https://id.lesbia.nz/bridge"
            >
                <span class="material-symbols-outlined">arrow_upward</span>
                <span class="font-label-ui text-[10px] mt-1">ASCEND</span>
            </a>
        </nav>

        <script>
            // ─────────────────────────────────────────────────────────────────────────
            // PROJECT DATA
            // To add a project: push a new object to this array.
            // To remove one: delete its object.
            // Fields:
            //   name    — module name displayed in the card header
            //   status  — badge text: "ONLINE" | "COMPILING" | "DEPLOYED" | "ARCHIVED" | etc.
            //   desc    — one-line description
            //   stats   — array of strings, each becomes a "> KEY: value" line
            //   url     — (optional) makes the card a link; omit or set null to disable
            // ─────────────────────────────────────────────────────────────────────────
            const PROJECTS = [
                {
                    name: "qutenote",
                    status: "ONLINE",
                    desc: "Deep-stack high-performance C++/Qt note engine optimised for silicon-level memory efficiency and cross-platform native execution.",
                    stats: ["MEM_ALLOC: 128MB", "UPTIME: 342h 12m"],
                    url: null,
                },
                {
                    name: "Kernel Hacking: SM-T380",
                    status: "COMPILING",
                    desc: "Reverse-engineering and mainlining for postmarketOS, bypassing SBOOT and TrustZone constraints for raw hardware control.",
                    stats: [
                        "TARGET_ARCH: ARM64",
                        "BUILD_STATUS: [||||||||||  ] 82%",
                    ],
                    url: null,
                },
                {
                    name: "AotearoaVolte",
                    status: "DEPLOYED",
                    desc: "Research and development of a 4G LTE tool; investigating silicon-level behaviour and protocol stack vulnerabilities.",
                    stats: ["NETWORK: 4G/LTE", "SEC_CLEARANCE: LEVEL_3"],
                    url: null,
                },
            ];

            // ─── Status badge colour map ─────────────────────────────────────────────
            // Add new statuses here as needed.
            const STATUS_STYLES = {
                ONLINE: {
                    bg: "bg-tertiary-fixed-dim/20",
                    text: "text-tertiary",
                    border: "border-tertiary",
                },
                COMPILING: {
                    bg: "bg-secondary-fixed-dim/20",
                    text: "text-secondary",
                    border: "border-secondary",
                },
                DEPLOYED: {
                    bg: "bg-terminal-pink/20",
                    text: "text-terminal-pink",
                    border: "border-terminal-pink",
                },
                ARCHIVED: {
                    bg: "bg-outline-variant/20",
                    text: "text-outline",
                    border: "border-outline",
                },
            };
            const STATUS_DEFAULT = {
                bg: "bg-outline-variant/20",
                text: "text-on-surface-variant",
                border: "border-outline-variant",
            };

            // ─── Card renderer ───────────────────────────────────────────────────────
            function renderCard(project) {
                const style = STATUS_STYLES[project.status] ?? STATUS_DEFAULT;
                const tag = project.url ? "a" : "div";
                const href = project.url ? `href="${project.url}"` : "";

                const stats = project.stats
                    .map((s) => `<span class="text-text-dim">&gt; ${s}</span>`)
                    .join("\n");

                return `
      <${tag} ${href}
        class="border border-secondary-container bg-surface-container/40 p-4
               hover:bg-surface-container/80 hover:border-primary
               transition-colors cursor-pointer group block">
        <div class="flex items-start justify-between gap-2">
          <div class="flex items-center gap-2 mb-2 min-w-0">
            <span class="text-secondary group-hover:text-primary shrink-0">&gt;</span>
            <span class="font-headline-lg-mobile text-text-bright tracking-wider
                         card-title transition-all duration-300 truncate">
              MODULE: ${project.name}
            </span>
          </div>
          <span class="font-label-ui text-[10px] shrink-0
                       ${style.bg} ${style.text} border ${style.border} px-2 py-1">
            ${project.status}
          </span>
        </div>
        <div class="pl-4 border-l border-outline-variant ml-1
                    flex flex-col gap-1 text-text-dim text-sm font-body-md mt-2">
          <span>&gt; DESC: ${project.desc}</span>
          ${stats}
        </div>
      </${tag}>`;
            }

            // ─── Boot sequence typewriter ────────────────────────────────────────────
            const terminalOutput = document.getElementById("terminal-output");
            const projectsContainer =
                document.getElementById("projects-container");
            const termHeaderText = document.getElementById("term-header-text");
            const moduleCount = document.getElementById("module-count");
            const cardsGrid = document.getElementById("cards-grid");

            const bootSequence = [
                "INIT SYSLOG...",
                "LOADING KERNEL MODULES [OK]",
                "MOUNTING VIRTUAL FILESYSTEMS [OK]",
                "ESTABLISHING SECURE CONNECTION...",
                "HANDSHAKE PROTOCOL: ACCEPTED",
                "DECRYPTING PAYLOAD...",
                "WARNING: UNAUTHORIZED ACCESS DETECTED.",
                "OVERRIDING SECURITY PROTOCOLS...",
                "[====================] 100%",
                "SYSTEM COMPROMISED. WELCOME.",
                "MOUNTING PROJECT DIRECTORY...",
            ];

            let lineIndex = 0;
            let charIndex = 0;
            let isTyping = false;

            function typeLine() {
                if (lineIndex < bootSequence.length) {
                    if (!isTyping) {
                        const lineDiv = document.createElement("div");
                        lineDiv.className = "flex";
                        lineDiv.innerHTML = `<span class="text-secondary mr-2 shrink-0">></span><span class="typewriter-text text-text-dim"></span><span class="cursor"></span>`;
                        terminalOutput.appendChild(lineDiv);
                        isTyping = true;
                        charIndex = 0;
                    }

                    const text = bootSequence[lineIndex];
                    const textSpan =
                        terminalOutput.lastChild.querySelector(
                            ".typewriter-text",
                        );

                    if (charIndex < text.length) {
                        textSpan.textContent += text.charAt(charIndex);
                        charIndex++;
                        setTimeout(typeLine, Math.random() * 30 + 10);
                    } else {
                        isTyping = false;
                        lineIndex++;

                        const oldCursor =
                            terminalOutput.lastChild.querySelector(".cursor");
                        if (oldCursor) oldCursor.remove();

                        if (
                            text.includes("WARNING") ||
                            text.includes("COMPROMISED")
                        ) {
                            textSpan.classList.replace(
                                "text-text-dim",
                                "text-terminal-pink",
                            );
                        } else if (text.includes("[OK]")) {
                            textSpan.classList.replace(
                                "text-text-dim",
                                "text-tertiary",
                            );
                        }

                        setTimeout(typeLine, 200);
                    }
                } else {
                    triggerProjectsReveal();
                }
            }

            function triggerProjectsReveal() {
                terminalOutput.style.opacity = "0";

                setTimeout(() => {
                    terminalOutput.classList.add("hidden");
                    terminalOutput.classList.remove("flex");

                    // Render cards from data
                    cardsGrid.innerHTML = PROJECTS.map(renderCard).join("");
                    moduleCount.textContent = `> ${PROJECTS.length} MODULE${PROJECTS.length !== 1 ? "S" : ""} LOADED.`;

                    projectsContainer.classList.remove("hidden");
                    projectsContainer.classList.add("flex");
                    termHeaderText.textContent = "PROJECT_DIR_V1.0";

                    setTimeout(() => {
                        projectsContainer.style.opacity = "1";
                    }, 50);
                }, 500);
            }

            window.addEventListener("load", () => {
                setTimeout(typeLine, 500);
            });
        </script>
    </body>
</html>
