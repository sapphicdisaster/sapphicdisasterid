<!doctype html>
<html class="dark" lang="en">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>PROJECT_DIR // id.lesbia.nz</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&amp;family=Press+Start+2P&amp;display=swap"
            rel="stylesheet"
        />
        <link href="/style.css" rel="stylesheet" />
        <script src="/projects.js"></script>
    </head>

    <body class="relative min-h-dvh flex-col">
        <a href="#projects-container" class="sr-only">Skip to main content</a>
        
        <!-- Environmental overlays -->
        <div class="grid-bg" aria-hidden="true"></div>
        <div class="crt-overlay" aria-hidden="true"></div>

        <main class="projects-layout-main">
            <div class="terminal-wrapper">
                <!-- Terminal title bar -->
                <div class="terminal-header">
                    <span class="terminal-header-title" id="term-header-text">BOOT_SEQ_V1.0</span>
                    <div class="terminal-header-buttons">
                        <div class="terminal-dot"></div>
                        <div class="terminal-dot"></div>
                        <div class="terminal-dot active"></div>
                    </div>
                </div>

                <!-- Boot sequence output (visible first) -->
                <div class="sr-only">System initializing. Root filesystem OK. Bypassing security protocols. System compromised. Mounting active projects.</div>
                <div class="boot-output" id="terminal-output" aria-hidden="true">
                    <!-- injected by JS -->
                </div>

                <!-- Projects directory (hidden until boot completes) -->
                <div class="projects-container" id="projects-container">
                    <!-- Header row -->
                    <div class="projects-header-row">
                        <h2 class="projects-title">/ACTIVE_PROJECTS</h2>
                        <p class="module-count" id="module-count"></p>
                    </div>

                    <!-- Cards injected here by JS -->
                    <div class="cards-grid" id="cards-grid"></div>
                </div>
            </div>
        </main>

        <!-- Bottom nav (all screen sizes) -->
        <nav class="bottom-nav">
            <!-- CORE -->
            <a class="nav-item inactive" href="https://id.lesbia.nz" aria-label="Core Site">
                <span class="material-symbols-outlined nav-icon" aria-hidden="true">memory</span>
                <span class="nav-label">CORE</span>
            </a>
            <!-- PROJECTS (active) -->
            <a class="nav-item active" href="https://id.lesbia.nz/projects" aria-label="Projects">
                <span class="material-symbols-outlined nav-icon" style="font-variation-settings: &quot;FILL&quot; 1" aria-hidden="true">save</span>
                <span class="nav-label">PROJECTS</span>
            </a>
            <!-- ASCEND -->
            <a class="nav-item btn-ascend" href="https://id.lesbia.nz/bridge" aria-label="Ascend to alternative experience">
                <span class="material-symbols-outlined nav-icon" aria-hidden="true">arrow_upward</span>
                <span class="nav-label">ASCEND</span>
            </a>
        </nav>

        <script>
            // ─── Boot sequence typewriter ────────────────────────────────────────────
            const terminalOutput = document.getElementById("terminal-output");
            const projectsContainer =
                document.getElementById("projects-container");
            const termHeaderText = document.getElementById("term-header-text");
            const moduleCount = document.getElementById("module-count");
            const cardsGrid = document.getElementById("cards-grid");

            const bootSequence = [
                "INIT ROOTFS [OK]",
                "BYPASSING SECURITY PROTOCOLS...",
                "[====================] 100%",
                "SYSTEM COMPROMISED. MOUNTING /PROJECTS...",
            ];

            let lineIndex = 0;
            let charIndex = 0;
            let isTyping = false;

            function typeLine() {
                if (lineIndex < bootSequence.length) {
                    if (!isTyping) {
                        const lineDiv = document.createElement("div");
                        lineDiv.className = "flex";
                        lineDiv.style.display = "flex";
                        lineDiv.innerHTML = `<span style="color: var(--secondary); margin-right: 0.5rem; flex-shrink: 0;">></span><span class="typewriter-text" style="color: var(--text-dim);"></span><span class="cursor"></span>`;
                        terminalOutput.appendChild(lineDiv);
                        isTyping = true;
                        charIndex = 0;
                    }

                    const text = bootSequence[lineIndex];
                    const textSpan =
                        terminalOutput.lastChild.querySelector(
                            ".typewriter-text",
                        );

                    if (charIndex < text.length) {
                        textSpan.textContent += text.charAt(charIndex);
                        charIndex++;
                        setTimeout(typeLine, Math.random() * 10 + 5);
                    } else {
                        isTyping = false;
                        lineIndex++;

                        const oldCursor =
                            terminalOutput.lastChild.querySelector(".cursor");
                        if (oldCursor) oldCursor.remove();

                        if (
                            text.includes("WARNING") ||
                            text.includes("COMPROMISED")
                        ) {
                            textSpan.style.color = "var(--terminal-pink)";
                        } else if (text.includes("[OK]")) {
                            textSpan.style.color = "var(--tertiary)";
                        }

                        setTimeout(typeLine, 100);
                    }
                } else {
                    triggerProjectsReveal();
                }
            }

            function triggerProjectsReveal() {
                terminalOutput.style.opacity = "0";

                setTimeout(() => {
                    terminalOutput.classList.add("hidden");
                    terminalOutput.style.display = "none";

                    // Render cards from data
                    cardsGrid.innerHTML = PROJECTS.map(renderCard).join("");
                    moduleCount.textContent = `> ${PROJECTS.length} MODULE${PROJECTS.length !== 1 ? "S" : ""} LOADED.`;

                    projectsContainer.style.display = "flex";
                    termHeaderText.textContent = "PROJECT_DIR_V1.0";

                    setTimeout(() => {
                        projectsContainer.style.opacity = "1";
                    }, 50);
                }, 500);
            }

            window.addEventListener("load", () => {
                setTimeout(typeLine, 500);
            });
        </script>
    </body>
</html>
